services:
  cleanup:
    image: alpine:latest
    volumes:
      - ./demo/data/uploads:/uploads
    command: >
      sh -c "
        echo 'Starting uploads directory cleanup...' &&
        find /uploads -type f ! -name '.gitkeep' -delete &&
        find /uploads -type d ! -path '/uploads' -exec rm -rf {} + 2>/dev/null || true &&
        echo 'Uploads directory cleaned (keeping .gitkeep)' &&
        echo 'Cleanup completed'
      "

  frontend:
    image: sam2/frontend
    build:
      context: ./demo/frontend
      dockerfile: frontend.Dockerfile
    ports:
      - 7262:80

  inference:
    image: sam2/inference
    build:
      context: .
      dockerfile: inference.Dockerfile
    ports:
      - 7263:5000
    volumes:
      - ./demo/data/:/data/:rw
    environment:
      - SERVER_ENVIRONMENT=DEV
      - GUNICORN_WORKERS=1
      # Inference API needs to have at least 2 threads to handle an incoming
      # parallel cancel propagation request
      - GUNICORN_THREADS=2
      - GUNICORN_PORT=5000
      - API_URL=http://localhost:7263
      - VIDEO_API_URL=http://video:5000
      - DEFAULT_VIDEO_PATH=gallery/xavier.mp4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  video:
    image: sam2/video
    build:
      context: .
      dockerfile: video.Dockerfile
    ports:
      - 7264:5000
    volumes:
      - ./demo/data/:/data/:rw
      - /mnt/c/Users/Public/sap_upload:/data/uploads:rw
    environment:
      - SERVER_ENVIRONMENT=PROD
      - FLASK_APP=video_app
      - FLASK_DEBUG=0
      - API_URL=http://localhost:7264
      - INFERENCE_API_URL=http://inference:5000
      # ffmpeg/video encode settings
      - FFMPEG_NUM_THREADS=4
      - VIDEO_ENCODE_CODEC=libx264
      - VIDEO_ENCODE_CRF=23
      - VIDEO_ENCODE_FPS=24
      - VIDEO_ENCODE_MAX_WIDTH=2048
      - VIDEO_ENCODE_MAX_HEIGHT=2048
      - VIDEO_ENCODE_VERBOSE=False
